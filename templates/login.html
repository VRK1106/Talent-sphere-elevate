<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Talent Sphere Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg1: #FFF3E6;
    --bg2: #EAE1FB;
    --card: #FFFDFA;
    --coral: #FF9166;
    --coral-dark: #E8734A;
    --plum: #4B3A63;
    --plum-soft: #8479A0;
    --mint: #7FD6B0;
    --ring: rgba(255,145,102,0.28);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    font-family:'Inter', sans-serif;
    background: radial-gradient(circle at 15% 15%, var(--bg1), transparent 55%),
                radial-gradient(circle at 85% 85%, var(--bg2), transparent 55%),
                linear-gradient(160deg, var(--bg1), var(--bg2));
    display:flex;
    align-items:center;
    justify-content:center;
    padding: 40px 20px;
    overflow-x:hidden;
    position:relative;
  }

  .floaty{
    position:absolute;
    border-radius:50%;
    filter: blur(2px);
    opacity:0.5;
    animation: drift 8s ease-in-out infinite;
  }
  .floaty:nth-child(1){ width:16px; height:16px; background:var(--mint); top:12%; left:18%; animation-delay:0s; }
  .floaty:nth-child(2){ width:10px; height:10px; background:var(--coral); top:70%; left:12%; animation-delay:1.5s; }
  .floaty:nth-child(3){ width:14px; height:14px; background:#FFD97D; top:20%; right:15%; animation-delay:0.8s; }
  .floaty:nth-child(4){ width:9px; height:9px; background:var(--plum-soft); bottom:15%; right:20%; animation-delay:2.2s; }
  @keyframes drift{
    0%,100%{ transform: translateY(0) translateX(0); }
    50%{ transform: translateY(-18px) translateX(8px); }
  }

  .scene{
    position:relative;
    width:100%;
    max-width:380px;
  }

  /* ---- MASCOT ---- */
  .mascot-wrap{
    display:flex;
    justify-content:center;
    margin-bottom: -34px;
    position:relative;
    z-index:5;
  }

  .blob{
    width:104px; height:96px;
    background: var(--coral);
    border-radius: 58% 58% 55% 55% / 62% 62% 45% 45%;
    position:relative;
    box-shadow: 0 10px 24px rgba(232,115,74,0.35);
    animation: idle 3.2s ease-in-out infinite;
    transition: transform 0.25s ease;
  }
  @keyframes idle{
    0%,100%{ transform: translateY(0) rotate(0deg); }
    50%{ transform: translateY(-5px) rotate(-1.5deg); }
  }
  .blob.happy{ animation: happy-bounce 0.6s ease; }
  @keyframes happy-bounce{
    0%{ transform: scale(1); }
    30%{ transform: scale(1.12, 0.88) translateY(4px); }
    55%{ transform: scale(0.94, 1.1) translateY(-14px); }
    75%{ transform: scale(1.05, 0.95) translateY(0); }
    100%{ transform: scale(1); }
  }
  .blob.shake{ animation: shake 0.5s ease; }
  @keyframes shake{
    0%,100%{ transform: rotate(0deg); }
    25%{ transform: rotate(-6deg); }
    75%{ transform: rotate(6deg); }
  }

  .cheek{
    position:absolute;
    width:14px; height:9px;
    background: rgba(232,115,74,0.55);
    border-radius:50%;
    top:56px;
  }
  .cheek.l{ left:12px; }
  .cheek.r{ right:12px; }

  .eyes{
    position:absolute;
    top:32px; left:0; right:0;
    display:flex;
    justify-content:center;
    gap:22px;
  }
  .eye{
    width:22px; height:22px;
    background: var(--plum);
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    transition: height 0.15s ease, transform 0.15s ease;
  }
  .pupil{
    width:8px; height:8px;
    background: #fff;
    border-radius:50%;
    transform: translate(0px, 0px);
    transition: transform 0.05s linear;
  }
  .eye.closed{ height:3px; border-radius:3px; }
  .eye.closed .pupil{ opacity:0; }

  /* hands covering eyes for password */
  .hands{
    position:absolute;
    top:26px; left:0; right:0;
    display:flex;
    justify-content:center;
    gap:8px;
    pointer-events:none;
    opacity:0;
    transform: translateY(14px) scale(0.7);
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .hands.show{ opacity:1; transform: translateY(0) scale(1); }
  .hand{
    width:26px; height:26px;
    background: var(--coral-dark);
    border-radius: 50% 50% 50% 5%;
  }
  .hand.right{ border-radius: 50% 50% 5% 50%; }

  .mouth{
    position:absolute;
    bottom:20px; left:50%;
    transform: translateX(-50%);
    width:20px; height:10px;
    border-bottom: 3px solid var(--plum);
    border-radius: 0 0 20px 20px;
    transition: all 0.2s ease;
  }
  .mouth.big{ width:28px; height:16px; border-width:3.5px; }
  .mouth.flat{ border-radius:0; height:0; width:16px; }

  .sparkle{
    position:absolute;
    font-size:18px;
    opacity:0;
    pointer-events:none;
  }
  .sparkle.pop{ animation: sparkle-pop 0.7s ease forwards; }
  @keyframes sparkle-pop{
    0%{ opacity:0; transform: translateY(0) scale(0.3) rotate(0deg); }
    30%{ opacity:1; }
    100%{ opacity:0; transform: translateY(-38px) scale(1.1) rotate(30deg); }
  }

  /* ---- CARD ---- */
  .card{
    background: var(--card);
    border-radius: 28px;
    padding: 52px 34px 32px;
    box-shadow: 0 20px 50px rgba(75,58,99,0.16);
    position:relative;
    opacity:0;
    animation: rise 0.55s ease forwards;
    animation-delay:0.1s;
  }
  @keyframes rise{ to{ opacity:1; transform:none; } }
  .card{ transform: translateY(10px); }

  h1{
    font-family:'Baloo 2', sans-serif;
    font-size:25px;
    font-weight:700;
    color: var(--plum);
    text-align:center;
    margin-bottom:6px;
  }
  .sub{
    text-align:center;
    font-size:13.5px;
    color: var(--plum-soft);
    margin-bottom:28px;
  }

  .field{ margin-bottom:16px; }
  label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color: var(--plum);
    margin-bottom:6px;
  }
  .input-wrap{ position:relative; }
  input{
    width:100%;
    padding: 12px 14px;
    border: 2px solid #F0E9FB;
    background: #FBF8FF;
    border-radius: 14px;
    font-size:14.5px;
    font-family:'Inter', sans-serif;
    color: var(--plum);
    outline:none;
    transition: border-color 0.2s ease, box-shadow 0.2s ease;
  }
  input::placeholder{ color:#BBAED6; }
  input:focus{
    border-color: var(--coral);
    box-shadow: 0 0 0 4px var(--ring);
  }

  .toggle-pw{
    position:absolute;
    right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none;
    font-size:12px; font-weight:600;
    color: var(--plum-soft);
    cursor:pointer;
  }
  .toggle-pw:hover{ color: var(--coral-dark); }

  .row-between{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin: 6px 0 22px;
    font-size:12.5px;
  }
  .remember{ display:flex; align-items:center; gap:6px; color: var(--plum-soft); }
  .remember input{ width:14px; height:14px; accent-color: var(--coral); }
  a.forgot{ color: var(--coral-dark); text-decoration:none; font-weight:600; }
  a.forgot:hover{ text-decoration:underline; }

  button.submit{
    width:100%;
    padding:14px;
    border:none;
    border-radius:16px;
    background: var(--coral);
    color:#fff;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    box-shadow: 0 8px 18px rgba(255,145,102,0.4);
    transition: transform 0.12s ease, box-shadow 0.12s ease;
  }
  button.submit:hover{ transform: translateY(-2px); box-shadow: 0 10px 22px rgba(255,145,102,0.48); }
  button.submit:active{ transform: translateY(0); }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .card{ opacity:1; transform:none; }
  }
</style>

<script>
    // Tab-specific Session Management for login
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let tabId = urlParams.get('tab_id');
        let storedTabId = sessionStorage.getItem('ts_tab_id');
        
        if (!storedTabId) {
            storedTabId = 'tab_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            sessionStorage.setItem('ts_tab_id', storedTabId);
        }
        
        if (tabId !== storedTabId) {
            urlParams.set('tab_id', storedTabId);
            window.location.search = urlParams.toString();
        }
    })();

    // Intercept form submissions to inject the tab ID
    document.addEventListener("DOMContentLoaded", () => {
        document.addEventListener("submit", function(e) {
            const form = e.target;
            const tabId = sessionStorage.getItem('ts_tab_id');
            if (tabId) {
                let input = form.querySelector('input[name="tab_id"]');
                if (!input) {
                    input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'tab_id';
                    form.appendChild(input);
                }
                input.value = tabId;
            }
        });
    });
</script>
</head>
<body>

<div class="floaty"></div>
<div class="floaty"></div>
<div class="floaty"></div>
<div class="floaty"></div>

<div class="scene">

  <div class="mascot-wrap">
    <div class="blob" id="blob">
      <div class="cheek l"></div>
      <div class="cheek r"></div>
      <div class="eyes" id="eyes">
        <div class="eye" id="eyeL"><div class="pupil" id="pupilL"></div></div>
        <div class="eye" id="eyeR"><div class="pupil" id="pupilR"></div></div>
      </div>
      <div class="hands" id="hands">
        <div class="hand left"></div>
        <div class="hand right"></div>
      </div>
      <div class="mouth" id="mouth"></div>
    </div>
  </div>

  <div class="card">
    <h1>Talent Sphere Elevate</h1>
    <p class="sub">Sign in to access your AI-powered corporate learning space.</p>

    <!-- Flashed messages container -->
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div style="background-color: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: #EF4444; padding: 0.65rem 0.85rem; border-radius: 10px; margin-bottom: 1.2rem; font-size: 0.82rem; font-weight: 500; text-align: center;">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form id="loginForm" method="POST" action="">
      <div class="field">
        <label for="username">Username or Email</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="Employee ID or Email" autocomplete="username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" id="togglePw">Show</button>
        </div>
      </div>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot">Forgot it?</a>
      </div>

      <button type="submit" class="submit" id="submitBtn">Let's go!</button>
    </form>

    <div style="text-align: center; margin-top: 24px; font-size: 11px; color: var(--plum-soft); line-height: 1.5; border-top: 1px dashed #F0E9FB; padding-top: 16px;">
        🔑 Demo credentials:<br>
        <b>admin</b> / <b>admin123</b> &nbsp;|&nbsp; <b>emp01</b> / <b>jane1234</b>
    </div>
  </div>
</div>

<script>
  const blob = document.getElementById('blob');
  const pupilL = document.getElementById('pupilL');
  const pupilR = document.getElementById('pupilR');
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');
  const hands = document.getElementById('hands');
  const mouth = document.getElementById('mouth');
  const userField = document.getElementById('username');
  const pwField = document.getElementById('password');

  let coveringEyes = false;

  // Mascot eyes track cursor
  document.addEventListener('mousemove', (e) => {
    if (coveringEyes) return;
    const rect = blob.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2 - 8;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const angle = Math.atan2(dy, dx);
    const dist = Math.min(3.4, Math.hypot(dx, dy) / 40);
    const px = Math.cos(angle) * dist;
    const py = Math.sin(angle) * dist;
    pupilL.style.transform = `translate(${px}px, ${py}px)`;
    pupilR.style.transform = `translate(${px}px, ${py}px)`;
  });

  userField.addEventListener('focus', () => {
    mouth.classList.add('big');
  });
  userField.addEventListener('blur', () => {
    mouth.classList.remove('big');
  });

  pwField.addEventListener('focus', () => {
    coveringEyes = true;
    hands.classList.add('show');
    eyeL.classList.add('closed');
    eyeR.classList.add('closed');
    mouth.classList.add('flat');
  });
  pwField.addEventListener('blur', () => {
    coveringEyes = false;
    hands.classList.remove('show');
    eyeL.classList.remove('closed');
    eyeR.classList.remove('closed');
    mouth.classList.remove('flat');
  });

  const togglePw = document.getElementById('togglePw');
  togglePw.addEventListener('click', () => {
    const isPw = pwField.type === 'password';
    pwField.type = isPw ? 'text' : 'password';
    togglePw.textContent = isPw ? 'Hide' : 'Show';
  });

  function spawnSparkles(){
    const wrap = document.querySelector('.mascot-wrap');
    const glyphs = ['✨','⭐','✦'];
    for(let i=0;i<3;i++){
      const s = document.createElement('div');
      s.className = 'sparkle pop';
      s.textContent = glyphs[i % glyphs.length];
      s.style.left = (30 + i*30) + 'px';
      s.style.top = '10px';
      s.style.animationDelay = (i*0.08) + 's';
      wrap.appendChild(s);
      setTimeout(() => s.remove(), 900);
    }
  }

  // Trigger shake on load if there's a flashed message
  {% if get_flashed_messages() %}
  document.addEventListener('DOMContentLoaded', () => {
    blob.classList.add('shake');
    setTimeout(() => blob.classList.remove('shake'), 600);
  });
  {% endif %}

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    blob.classList.remove('shake');
    if (!userField.value || !pwField.value){
      blob.classList.add('shake');
      setTimeout(() => blob.classList.remove('shake'), 500);
      return;
    }
    
    // Play happy bounce & sparkles animation
    blob.classList.add('happy');
    spawnSparkles();
    document.getElementById('submitBtn').textContent = 'Signing in...';
    
    // Submit form after animation completes
    setTimeout(() => {
      e.target.submit();
    }, 600);
  });
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In - Talent Sphere Elevate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:  #030712;
    --card: rgba(13,17,23,0.82);
    --primary: #6366f1;
    --primary-dark: #4f46e5;
    --accent: #a855f7;
    --secondary: #10b981;
    --text: #F3F4F6;
    --text-soft: #9CA3AF;
    --ring: rgba(99,102,241,0.3);
    --border: rgba(255,255,255,0.07);
    --input-bg: rgba(255,255,255,0.04);
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    min-height:100vh;
    font-family:'Outfit','Inter',sans-serif;
    background:
      radial-gradient(circle at 15% 15%, rgba(99,102,241,0.14) 0%, transparent 55%),
      radial-gradient(circle at 85% 85%, rgba(16,185,129,0.12) 0%, transparent 55%),
      radial-gradient(circle at 50% 50%, rgba(168,85,247,0.08) 0%, transparent 50%),
      var(--bg);
    display:flex;
    align-items:center;
    justify-content:center;
    padding:40px 20px;
    overflow-x:hidden;
    position:relative;
  }

  /* Subtle grid overlay */
  body::before{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background-image:
      linear-gradient(rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size:50px 50px;
    opacity:0.8;
    z-index:0;
  }

  /* ---- Floating orbs ---- */
  .floaty{
    position:absolute;
    border-radius:50%;
    filter:blur(2px);
    opacity:0.55;
    animation:drift 8s ease-in-out infinite;
    z-index:0;
  }
  .floaty:nth-child(1){ width:16px; height:16px; background:var(--secondary); top:12%; left:18%; animation-delay:0s; }
  .floaty:nth-child(2){ width:10px; height:10px; background:var(--primary); top:70%; left:12%; animation-delay:1.5s; }
  .floaty:nth-child(3){ width:14px; height:14px; background:#FFD97D; top:20%; right:15%; animation-delay:0.8s; }
  .floaty:nth-child(4){ width:9px;  height:9px;  background:var(--accent); bottom:15%; right:20%; animation-delay:2.2s; }
  @keyframes drift{
    0%,100%{ transform:translateY(0) translateX(0); }
    50%{ transform:translateY(-18px) translateX(8px); }
  }

  .scene{
    position:relative;
    width:100%;
    max-width:400px;
    z-index:1;
  }

  /* ---- MASCOT ---- */
  .mascot-wrap{
    display:flex;
    justify-content:center;
    margin-bottom:-34px;
    position:relative;
    z-index:5;
  }

  .blob{
    width:104px; height:96px;
    background:linear-gradient(135deg, var(--primary), var(--accent));
    border-radius:58% 58% 55% 55% / 62% 62% 45% 45%;
    position:relative;
    box-shadow: 0 10px 30px rgba(99,102,241,0.4), 0 0 0 1px rgba(255,255,255,0.07);
    animation:idle 3.2s ease-in-out infinite;
    transition:transform 0.25s ease;
  }
  @keyframes idle{
    0%,100%{ transform:translateY(0) rotate(0deg); }
    50%{ transform:translateY(-5px) rotate(-1.5deg); }
  }
  .blob.happy{ animation:happy-bounce 0.6s ease; }
  @keyframes happy-bounce{
    0%{ transform:scale(1); }
    30%{ transform:scale(1.12,0.88) translateY(4px); }
    55%{ transform:scale(0.94,1.1) translateY(-14px); }
    75%{ transform:scale(1.05,0.95) translateY(0); }
    100%{ transform:scale(1); }
  }
  .blob.shake{ animation:shake 0.5s ease; }
  @keyframes shake{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-6deg); }
    75%{ transform:rotate(6deg); }
  }

  .cheek{
    position:absolute;
    width:14px; height:9px;
    background:rgba(168,85,247,0.45);
    border-radius:50%;
    top:56px;
  }
  .cheek.l{ left:12px; }
  .cheek.r{ right:12px; }

  .eyes{
    position:absolute;
    top:32px; left:0; right:0;
    display:flex;
    justify-content:center;
    gap:22px;
  }
  .eye{
    width:22px; height:22px;
    background:var(--text);
    border-radius:50%;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:height 0.15s ease, transform 0.15s ease;
  }
  .pupil{
    width:8px; height:8px;
    background:#030712;
    border-radius:50%;
    transform:translate(0px,0px);
    transition:transform 0.05s linear;
  }
  .eye.closed{ height:3px; border-radius:3px; }
  .eye.closed .pupil{ opacity:0; }

  .hands{
    position:absolute;
    top:26px; left:0; right:0;
    display:flex;
    justify-content:center;
    gap:8px;
    pointer-events:none;
    opacity:0;
    transform:translateY(14px) scale(0.7);
    transition:opacity 0.25s ease, transform 0.25s ease;
  }
  .hands.show{ opacity:1; transform:translateY(0) scale(1); }
  .hand{
    width:26px; height:26px;
    background:var(--primary-dark);
    border-radius:50% 50% 50% 5%;
  }
  .hand.right{ border-radius:50% 50% 5% 50%; }

  .mouth{
    position:absolute;
    bottom:20px; left:50%;
    transform:translateX(-50%);
    width:20px; height:10px;
    border-bottom:3px solid var(--text);
    border-radius:0 0 20px 20px;
    transition:all 0.2s ease;
  }
  .mouth.big{ width:28px; height:16px; border-width:3.5px; }
  .mouth.flat{ border-radius:0; height:0; width:16px; }

  .sparkle{
    position:absolute;
    font-size:18px;
    opacity:0;
    pointer-events:none;
  }
  .sparkle.pop{ animation:sparkle-pop 0.7s ease forwards; }
  @keyframes sparkle-pop{
    0%{ opacity:0; transform:translateY(0) scale(0.3) rotate(0deg); }
    30%{ opacity:1; }
    100%{ opacity:0; transform:translateY(-38px) scale(1.1) rotate(30deg); }
  }

  /* ---- CARD ---- */
  .card{
    background:var(--card);
    backdrop-filter:blur(24px);
    -webkit-backdrop-filter:blur(24px);
    border-radius:28px;
    border:1px solid var(--border);
    padding:52px 36px 34px;
    box-shadow:
      0 24px 60px rgba(0,0,0,0.5),
      0 0 0 1px rgba(255,255,255,0.05),
      inset 0 1px 0 rgba(255,255,255,0.06);
    position:relative;
    opacity:0;
    animation:rise 0.55s ease forwards;
    animation-delay:0.1s;
    transform:translateY(12px);
  }
  @keyframes rise{ to{ opacity:1; transform:none; } }

  h1{
    font-family:'Outfit',sans-serif;
    font-size:26px;
    font-weight:800;
    background:linear-gradient(135deg, var(--primary), var(--accent));
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-align:center;
    margin-bottom:6px;
    letter-spacing:-0.5px;
  }
  .sub{
    text-align:center;
    font-size:13.5px;
    color:var(--text-soft);
    margin-bottom:30px;
    line-height:1.5;
  }

  .flash-msg{
    background:rgba(239,68,68,0.1);
    border:1px solid rgba(239,68,68,0.25);
    color:#f87171;
    padding:0.65rem 0.9rem;
    border-radius:12px;
    margin-bottom:1.2rem;
    font-size:0.82rem;
    font-weight:500;
    text-align:center;
  }

  .field{ margin-bottom:18px; }
  label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:var(--text-soft);
    margin-bottom:6px;
    text-transform:uppercase;
    letter-spacing:0.05em;
  }
  .input-wrap{ position:relative; }
  input[type=text],
  input[type=password],
  input[type=email]{
    width:100%;
    padding:13px 16px;
    border:1px solid var(--border);
    background:var(--input-bg);
    border-radius:14px;
    font-size:14.5px;
    font-family:'Inter',sans-serif;
    color:var(--text);
    outline:none;
    transition:border-color 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
  }
  input::placeholder{ color:rgba(156,163,175,0.5); }
  input:focus{
    border-color:var(--primary);
    background:rgba(99,102,241,0.06);
    box-shadow:0 0 0 4px var(--ring);
  }

  .toggle-pw{
    position:absolute;
    right:12px; top:50%; transform:translateY(-50%);
    background:none; border:none;
    font-size:11px; font-weight:700;
    color:var(--text-soft);
    cursor:pointer;
    letter-spacing:0.06em;
    text-transform:uppercase;
    transition:color 0.15s;
  }
  .toggle-pw:hover{ color:var(--primary); }

  .row-between{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:8px 0 24px;
    font-size:12.5px;
  }
  .remember{ display:flex; align-items:center; gap:6px; color:var(--text-soft); }
  .remember input[type=checkbox]{
    width:14px; height:14px;
    accent-color:var(--primary);
    background:none;
    border:none;
    padding:0;
  }
  a.forgot{ color:var(--primary); text-decoration:none; font-weight:600; }
  a.forgot:hover{ text-decoration:underline; }

  button.submit{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg, var(--primary), var(--accent));
    color:#fff;
    font-family:'Outfit',sans-serif;
    font-weight:700;
    font-size:16px;
    cursor:pointer;
    box-shadow:0 8px 24px rgba(99,102,241,0.4);
    transition:transform 0.12s ease, box-shadow 0.12s ease;
    letter-spacing:0.02em;
  }
  button.submit:hover{
    transform:translateY(-2px);
    box-shadow:0 12px 28px rgba(99,102,241,0.5);
  }
  button.submit:active{ transform:translateY(0); }

  .demo-creds{
    text-align:center;
    margin-top:22px;
    font-size:11px;
    color:var(--text-soft);
    line-height:1.6;
    border-top:1px solid var(--border);
    padding-top:16px;
  }
  .demo-creds code{
    background:rgba(99,102,241,0.1);
    border:1px solid rgba(99,102,241,0.15);
    color:var(--primary);
    padding:0.1rem 0.4rem;
    border-radius:5px;
    font-size:11px;
    font-family:'Inter',monospace;
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
    .card{ opacity:1; transform:none; }
  }
</style>

<script>
    // Tab-specific Session Management for login
    (function() {
        const urlParams = new URLSearchParams(window.location.search);
        let tabId = urlParams.get('tab_id');
        let storedTabId = sessionStorage.getItem('ts_tab_id');
        
        if (!storedTabId) {
            storedTabId = 'tab_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
            sessionStorage.setItem('ts_tab_id', storedTabId);
        }
        
        if (tabId !== storedTabId) {
            urlParams.set('tab_id', storedTabId);
            window.location.search = urlParams.toString();
        }
    })();

    document.addEventListener("DOMContentLoaded", () => {
        document.addEventListener("submit", function(e) {
            const form = e.target;
            const tabId = sessionStorage.getItem('ts_tab_id');
            if (tabId) {
                let input = form.querySelector('input[name="tab_id"]');
                if (!input) {
                    input = document.createElement('input');
                    input.type = 'hidden';
                    input.name = 'tab_id';
                    form.appendChild(input);
                }
                input.value = tabId;
            }
        });
    });
</script>
</head>
<body>

<div class="floaty"></div>
<div class="floaty"></div>
<div class="floaty"></div>
<div class="floaty"></div>

<div class="scene">

  <div class="mascot-wrap">
    <div class="blob" id="blob">
      <div class="cheek l"></div>
      <div class="cheek r"></div>
      <div class="eyes" id="eyes">
        <div class="eye" id="eyeL"><div class="pupil" id="pupilL"></div></div>
        <div class="eye" id="eyeR"><div class="pupil" id="pupilR"></div></div>
      </div>
      <div class="hands" id="hands">
        <div class="hand left"></div>
        <div class="hand right"></div>
      </div>
      <div class="mouth" id="mouth"></div>
    </div>
  </div>

  <div class="card">
    <h1>Talent Sphere Elevate</h1>
    <p class="sub">Sign in to access your AI-powered corporate learning space.</p>

    {% with messages = get_flashed_messages() %}
        {% if messages %}
            {% for message in messages %}
                <div class="flash-msg">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form id="loginForm" method="POST" action="">
      <div class="field">
        <label for="username">Username or Email</label>
        <div class="input-wrap">
          <input type="text" id="username" name="username" placeholder="Employee ID or email" autocomplete="username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-pw" id="togglePw">Show</button>
        </div>
      </div>

      <div class="row-between">
        <label class="remember">
          <input type="checkbox" id="remember">
          Remember me
        </label>
        <a href="#" class="forgot">Forgot it?</a>
      </div>

      <button type="submit" class="submit" id="submitBtn">Let's go! ✦</button>
    </form>

    <div class="demo-creds">
        🔑 Demo credentials:<br>
        <code>admin</code> / <code>admin123</code> &nbsp;|&nbsp; <code>emp01</code> / <code>jane1234</code>
    </div>
  </div>
</div>

<script>
  const blob = document.getElementById('blob');
  const pupilL = document.getElementById('pupilL');
  const pupilR = document.getElementById('pupilR');
  const eyeL = document.getElementById('eyeL');
  const eyeR = document.getElementById('eyeR');
  const hands = document.getElementById('hands');
  const mouth = document.getElementById('mouth');
  const userField = document.getElementById('username');
  const pwField = document.getElementById('password');

  let coveringEyes = false;

  document.addEventListener('mousemove', (e) => {
    if (coveringEyes) return;
    const rect = blob.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2 - 8;
    const dx = e.clientX - cx;
    const dy = e.clientY - cy;
    const angle = Math.atan2(dy, dx);
    const dist = Math.min(3.4, Math.hypot(dx, dy) / 40);
    const px = Math.cos(angle) * dist;
    const py = Math.sin(angle) * dist;
    pupilL.style.transform = `translate(${px}px, ${py}px)`;
    pupilR.style.transform = `translate(${px}px, ${py}px)`;
  });

  userField.addEventListener('focus', () => { mouth.classList.add('big'); });
  userField.addEventListener('blur', () => { mouth.classList.remove('big'); });

  pwField.addEventListener('focus', () => {
    coveringEyes = true;
    hands.classList.add('show');
    eyeL.classList.add('closed');
    eyeR.classList.add('closed');
    mouth.classList.add('flat');
  });
  pwField.addEventListener('blur', () => {
    coveringEyes = false;
    hands.classList.remove('show');
    eyeL.classList.remove('closed');
    eyeR.classList.remove('closed');
    mouth.classList.remove('flat');
  });

  const togglePw = document.getElementById('togglePw');
  togglePw.addEventListener('click', () => {
    const isPw = pwField.type === 'password';
    pwField.type = isPw ? 'text' : 'password';
    togglePw.textContent = isPw ? 'Hide' : 'Show';
  });

  function spawnSparkles(){
    const wrap = document.querySelector('.mascot-wrap');
    const glyphs = ['✨','⭐','✦'];
    for(let i=0;i<3;i++){
      const s = document.createElement('div');
      s.className = 'sparkle pop';
      s.textContent = glyphs[i % glyphs.length];
      s.style.left = (30 + i*30) + 'px';
      s.style.top = '10px';
      s.style.animationDelay = (i*0.08) + 's';
      wrap.appendChild(s);
      setTimeout(() => s.remove(), 900);
    }
  }

  {% if get_flashed_messages() %}
  document.addEventListener('DOMContentLoaded', () => {
    blob.classList.add('shake');
    setTimeout(() => blob.classList.remove('shake'), 600);
  });
  {% endif %}

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    blob.classList.remove('shake');
    if (!userField.value || !pwField.value){
      blob.classList.add('shake');
      setTimeout(() => blob.classList.remove('shake'), 500);
      return;
    }
    blob.classList.add('happy');
    spawnSparkles();
    document.getElementById('submitBtn').textContent = 'Signing in…';
    setTimeout(() => { e.target.submit(); }, 600);
  });
</script>

</body>
</html>
